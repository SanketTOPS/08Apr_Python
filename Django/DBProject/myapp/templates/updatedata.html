<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome</title>
</head>

<body style="background-color: aliceblue;">
    <h1 style="text-align: center;color: blue;">Update Data</h1>
    <hr>

    <form method="post">
        {% csrf_token %}
        <input type="text" value="{{stid.name}}" name="name" id="" placeholder="Name"> <br><br>
        <input type="email" value="{{stid.email}}" name="email" id="" placeholder="Email"> <br><br>
        <input type="number" value="{{stid.mobile}}" name="mobile" id="" placeholder="Mobile"> <br><br>
        <input type="submit">
    </form>

    <hr>
    <a href="/showdata">Showdata</a>
</body>

</html>
